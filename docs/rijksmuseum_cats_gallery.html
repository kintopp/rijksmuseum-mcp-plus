const gallery = document.getElementById('gallery');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');

function iiifThumb(hash) {
  if (!hash) return null;
  return `https://iiif.micr.io/${hash}/full/!400,500/0/default.jpg`;
}

function renderCards(items) {
  gallery.innerHTML = '';
  if (items.length === 0) {
    gallery.innerHTML = '<div class="no-results">No matching artworks found.</div>';
    countEl.textContent = `Showing 0 of ${DATA.length}`;
    return;
  }
  countEl.textContent = `Showing ${items.length} of ${DATA.length}`;
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const imgUrl = iiifThumb(item.h);
    card.innerHTML = `
      <a href="${item.url}" target="_blank" rel="noopener">
        <div class="img-wrap">
          <span class="placeholder">&mdash;</span>
          ${imgUrl ? `<img src="${imgUrl}" alt="${item.title}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none'">` : ''}
        </div>
        <div class="info">
          <div class="title">${item.title}</div>
          <div class="creator">${item.c}</div>
          <div class="meta">
            <span>${item.d}</span>
            <span class="type-badge">${item.t}</span>
          </div>
        </div>
      </a>
    `;
    gallery.appendChild(card);
  });
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { renderCards(DATA); return; }
  const filtered = DATA.filter(d =>
    d.title.toLowerCase().includes(q) ||
    d.c.toLowerCase().includes(q) ||
    d.d.includes(q) ||
    d.t.toLowerCase().includes(q) ||
    d.n.toLowerCase().includes(q)
  );
  renderCards(filtered);
});

renderCards(DATA);
</script>
